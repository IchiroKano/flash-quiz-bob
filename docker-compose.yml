version: '3.8'

services:
  # MySQLデータベース
  mysql:
    build: ./mysql
    container_name: flash-quiz-bob-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - ome_flashquiz_bob
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Node.js APIサーバー
  api:
    build: ./api
    container_name: flash-quiz-bob-api
    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Datadog設定
      DD_SERVICE: flash-quiz-bob-api
      DD_ENV: ${DD_ENV}
      DD_VERSION: ${DD_VERSION}
      DD_AGENT_HOST: ${DD_AGENT_HOST}
      DD_TRACE_AGENT_PORT: ${DD_TRACE_AGENT_PORT}
      DD_LOGS_INJECTION: ${DD_LOGS_INJECTION}
      DD_TRACE_SAMPLE_RATE: ${DD_TRACE_SAMPLE_RATE}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ome_flashquiz_bob
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3012/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Nginx Webサーバー
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: flash-quiz-bob-web
    ports:
      - "8083:80"
    depends_on:
      - api
    networks:
      - ome_flashquiz_bob
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./data/nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  ome_flashquiz_bob:
    driver: bridge

# Made with Bob
