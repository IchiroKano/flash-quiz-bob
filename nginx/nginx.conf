user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ログフォーマット
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # アップストリーム設定（APIサーバー）
    upstream api_backend {
        server api:3012;
        keepalive 32;
    }

    # HTTPサーバー（ホストNginxからのプロキシを想定）
    server {
        listen 80;
        server_name _;

        # セキュリティヘッダー
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # 静的ファイル配信（フロントエンド）- ベースパス /flashquiz_bob/
        location /flashquiz_bob/ {
            alias /usr/share/nginx/html/;
            index index.html;
            try_files $uri $uri/ /flashquiz_bob/index.html;
            
            # キャッシュ設定
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # CSS/JSファイルのキャッシュ
        location ~* ^/flashquiz_bob/(.+\.(css|js))$ {
            alias /usr/share/nginx/html/$1;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 画像ファイルのキャッシュ
        location ~* ^/flashquiz_bob/(.+\.(jpg|jpeg|png|gif|ico|svg|webp))$ {
            alias /usr/share/nginx/html/$1;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # APIプロキシ - ベースパス /flashquiz_bob/api/
        location /flashquiz_bob/api/ {
            rewrite ^/flashquiz_bob/api/(.*)$ /api/$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            
            # プロキシヘッダー
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # タイムアウト設定
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # バッファリング
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # エラーハンドリング
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # ヘルスチェックエンドポイント
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # エラーページ
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}

